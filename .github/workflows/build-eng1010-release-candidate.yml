name: Build ENG 1010 Release Candidate

on:
  push:
    branches:
      - eng1010-direct-renaming-package
    paths:
      - tools/build_eng1010_release_candidate.py
      - tools/test_eng1010_release_candidate.py
      - .github/workflows/build-eng1010-release-candidate.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out deployment branch
        uses: actions/checkout@v4
        with:
          ref: eng1010-direct-renaming-package
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build and browser-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4 playwright
          python -m playwright install --with-deps chromium

      - name: Build isolated direct-renaming package
        run: python tools/build_eng1010_release_candidate.py

      - name: Run static regression tests
        run: python tools/test_eng1010_release_candidate.py --static

      - name: Run browser regression tests
        run: python tools/test_eng1010_release_candidate.py --browser

      - name: Commit tested release candidate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-candidate
          if git diff --cached --quiet; then
            echo "Release candidate is already current."
          else
            git commit -m "Build tested ENG 1010 direct-renaming release candidate"
            git push origin HEAD:eng1010-direct-renaming-package
          fi
