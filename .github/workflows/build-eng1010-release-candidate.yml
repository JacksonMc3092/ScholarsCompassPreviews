name: Build ENG 1010 Release Candidate

on:
  push:
    branches:
      - eng1010-direct-renaming-package
    paths:
      - tools/build_eng1010_release_candidate.py
      - tools/test_eng1010_release_candidate.py
      - .github/workflows/build-eng1010-release-candidate.yml
  pull_request:
    branches:
      - main
    paths:
      - tools/build_eng1010_release_candidate.py
      - tools/test_eng1010_release_candidate.py
      - .github/workflows/build-eng1010-release-candidate.yml
      - release-candidate/**
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  build-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out deployment branch
        uses: actions/checkout@v4
        with:
          ref: eng1010-direct-renaming-package
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build and browser-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4 playwright
          python -m playwright install --with-deps chromium

      - name: Build isolated direct-renaming package
        run: |
          set -o pipefail
          python tools/build_eng1010_release_candidate.py 2>&1 | tee build.log

      - name: Run static regression tests
        run: |
          set -o pipefail
          python tools/test_eng1010_release_candidate.py --static 2>&1 | tee static-tests.log

      - name: Run browser regression tests
        run: |
          set -o pipefail
          python tools/test_eng1010_release_candidate.py --browser 2>&1 | tee browser-tests.log

      - name: Upload diagnostic package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eng1010-release-candidate-diagnostics
          path: |
            build.log
            static-tests.log
            browser-tests.log
            release-candidate/
          if-no-files-found: warn

      - name: Commit tested release candidate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-candidate
          if git diff --cached --quiet; then
            echo "Release candidate is already current."
          else
            git commit -m "Build tested ENG 1010 direct-renaming release candidate"
            git push origin HEAD:eng1010-direct-renaming-package
          fi
