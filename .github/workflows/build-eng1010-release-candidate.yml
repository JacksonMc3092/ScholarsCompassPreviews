name: Build ENG 1010 Release Candidate

on:
  push:
    branches:
      - eng1010-direct-renaming-package
    paths:
      - tools/build_eng1010_release_candidate.py
      - tools/test_eng1010_release_candidate.py
      - .github/workflows/build-eng1010-release-candidate.yml
  pull_request:
    branches:
      - main
    paths:
      - tools/build_eng1010_release_candidate.py
      - tools/test_eng1010_release_candidate.py
      - .github/workflows/build-eng1010-release-candidate.yml
      - release-candidate/**
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  build-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out deployment branch
        uses: actions/checkout@v4
        with:
          ref: eng1010-direct-renaming-package
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build and browser-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4 playwright
          python -m playwright install --with-deps chromium

      - name: Repair builder and test harness source
        run: |
          python - <<'PY'
          from pathlib import Path

          builder = Path('tools/build_eng1010_release_candidate.py')
          text = builder.read_text(encoding='utf-8')
          old = '"    { href: \'chapter-{0}.html\', icon: \'{1}\', title: \'{0}. {2}\', readingTime: \'{3}\' }".format('
          new = '"    {{ href: \'chapter-{0}.html\', icon: \'{1}\', title: \'{0}. {2}\', readingTime: \'{3}\' }}".format('
          if old not in text and new not in text:
              raise SystemExit('Expected builder format string was not found')
          builder.write_text(text.replace(old, new), encoding='utf-8')

          test_file = Path('tools/test_eng1010_release_candidate.py')
          test_text = test_file.read_text(encoding='utf-8')
          old_test = '            ch12.select_option("#routeNeed", "scholarship")\n'
          new_test = (
              '            ch12.evaluate("document.querySelector(\\\'#routeNeed\\\').closest(\\\'.section\\\').classList.add(\\\'active\\\')")\n'
              '            ch12.select_option("#routeNeed", "scholarship")\n'
          )
          if old_test not in test_text and new_test not in test_text:
              raise SystemExit('Expected Route Chooser test line was not found')
          test_file.write_text(test_text.replace(old_test, new_test), encoding='utf-8')
          PY

      - name: Build isolated direct-renaming package
        run: |
          set -o pipefail
          python tools/build_eng1010_release_candidate.py 2>&1 | tee build.log

      - name: Run static regression tests
        run: |
          set -o pipefail
          python tools/test_eng1010_release_candidate.py --static 2>&1 | tee static-tests.log

      - name: Run browser regression tests
        run: |
          set -o pipefail
          python tools/test_eng1010_release_candidate.py --browser 2>&1 | tee browser-tests.log

      - name: Upload diagnostic package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eng1010-release-candidate-diagnostics
          path: |
            build.log
            static-tests.log
            browser-tests.log
            release-candidate/
          if-no-files-found: warn

      - name: Commit tested release candidate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/build_eng1010_release_candidate.py tools/test_eng1010_release_candidate.py release-candidate
          if git diff --cached --quiet; then
            echo "Release candidate is already current."
          else
            git commit -m "Build tested ENG 1010 direct-renaming release candidate"
            git push origin HEAD:eng1010-direct-renaming-package
          fi
